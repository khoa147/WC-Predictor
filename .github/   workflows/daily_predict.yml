
name: WC2026 Daily Predictor

on:
  schedule:
    - cron: "9 2 * * *"   # 09:09 VN tự động hằng ngày
  workflow_dispatch:
    inputs:
      predict_date:
        description: "Ngày muốn dự đoán (YYYY-MM-DD). Để trống = hôm nay"
        required: false
        default: ""

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: Run predictor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PREDICT_DATE: ${{ github.event.inputs.predict_date }}
        run: python src/predictor.py
